version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: llantaland_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: llantaland_crm
      POSTGRES_USER: llantaland
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Debes definir DB_PASSWORD (sin valor por defecto por seguridad)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sin mapeo de puerto al host: solo el backend necesita alcanzar a Postgres,
    # y lo hace por la red interna de Docker (host "postgres", puerto 5432).
    # Exponerlo al host/internet no aporta nada y es un riesgo innecesario.
    networks:
      - llantaland_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U llantaland -d llantaland_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llantaland_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://llantaland:${DB_PASSWORD:?Debes definir DB_PASSWORD (sin valor por defecto por seguridad)}@postgres:5432/llantaland_crm?connection_limit=25&pool_timeout=20
      JWT_SECRET: ${JWT_SECRET:?Debes definir JWT_SECRET (sin valor por defecto por seguridad)}
      JWT_EXPIRES_IN: 8h
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_EXTRA_ORIGIN: ${CORS_EXTRA_ORIGIN:-http://161.97.102.3:3000}
      N8N_API_KEY: ${N8N_API_KEY:-}
      # Solo se usa durante una rotacion de N8N_API_KEY: mientras el workflow
      # de n8n todavia tiene nodos con la clave vieja, el backend acepta
      # ambas para no cortar el bot. Se quita despues de confirmar que ya
      # no llegan pedidos con la clave vieja.
      N8N_API_KEY_OLD: ${N8N_API_KEY_OLD:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      API_DNI_URL: ${API_DNI_URL:-}
      API_DNI_KEY: ${API_DNI_KEY:-}
      API_RUC_URL: ${API_RUC_URL:-}
      API_RUC_KEY: ${API_RUC_KEY:-}
      API_CE_URL: ${API_CE_URL:-}
      API_CE_KEY: ${API_CE_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 10mb
    volumes:
      - uploads_data:/app/uploads
    ports:
      - '3001:3001'
    networks:
      - llantaland_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llantaland_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    networks:
      - llantaland_net

volumes:
  postgres_data:
  uploads_data:

networks:
  llantaland_net:
    driver: bridge
