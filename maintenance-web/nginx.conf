server {
    listen 80;
    server_name llantaland.com www.llantaland.com;
    root /usr/share/nginx/html;
    index index.html;

    # HTTP 503 + Retry-After → Google conserva el ranking actual
    # Google interpreta 503 como caída temporal y NO penaliza el posicionamiento
    add_header Retry-After "86400" always;

    location / {
        try_files $uri $uri/ /index.html;
        return 503;
    }

    # Permitir que Googlebot acceda al contenido del HTML (para indexar la marca)
    error_page 503 /index.html;
    location = /index.html {
        internal;
        add_header Retry-After "86400" always;
    }

    # Robots.txt — permitir indexación
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: https://llantaland.com/sitemap.xml\n";
    }

    # Comprimir respuestas
    gzip on;
    gzip_types text/html text/css application/javascript;
}
