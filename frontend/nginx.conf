server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://llantaland_api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy uploads to backend
    location /uploads/ {
        proxy_pass http://llantaland_api:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # index.html nunca se cachea — así el browser siempre carga el JS más nuevo
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre → caché larga (son inmutables por Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
