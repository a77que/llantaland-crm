server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver de Docker para hostnames dinámicos
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy API → backend (nombre del servicio en EasyPanel: "api")
    location /api/ {
        set $backend http://api:3001;
        proxy_pass $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Proxy uploads → backend
    location /uploads/ {
        set $backend http://api:3001;
        proxy_pass $backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # index.html sin caché
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash — caché larga
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
