<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon"       type="image/svg+xml" href="/OsoLogoSVG.svg" />
    <link rel="shortcut icon"                   href="/OsoLogoSVG.svg" />
    <link rel="apple-touch-icon"                href="/OsoLogoSVG.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Llantaland CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Black+Ops+One&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }

      :root {
        /* ── Colores Llantaland ── */
        --color-primary:       #f5c400;   /* amarillo marca */
        --color-primary-dark:  #d4a900;   /* amarillo oscuro hover */
        --color-primary-light: #ffd400;   /* amarillo claro */
        --color-accent:        #e3000f;   /* rojo marca */
        --color-success:       #16a34a;
        --color-warning:       #ca8a04;
        --color-danger:        #dc2626;

        /* ── Fondos claros (interior del CRM) ── */
        --color-bg:            #f8fafc;
        --color-surface:       #ffffff;
        --color-surface2:      #f1f5f9;

        /* ── Bordes ── */
        --color-border:        #e2e8f0;
        --color-border2:       #cbd5e1;

        /* ── Texto oscuro ── */
        --color-text:          #1e293b;
        --color-text-muted:    #64748b;

        /* ── Layout ── */
        --sidebar-width:       240px;
        --topbar-height:       56px;
        --bottom-nav-height:   64px;
        --radius:              8px;
        --safe-bottom:         env(safe-area-inset-bottom, 0px);
        --safe-top:            env(safe-area-inset-top, 0px);

        /* ── Sombras ── */
        --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
        --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
        --shadow-lg: 0 10px 20px rgba(0,0,0,.1), 0 4px 8px rgba(0,0,0,.06);
      }

      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: inherit; }
      input, select, textarea { font-family: inherit; font-size: 16px; }

      /* Scrollbar amarillo */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #f5c400; border-radius: 2px; }

      ::selection { background: #f5c400; color: #000; }
      * { -webkit-tap-highlight-color: transparent; }
      button { user-select: none; -webkit-user-select: none; }

      .fade-in { animation: fadeIn .2s ease; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
