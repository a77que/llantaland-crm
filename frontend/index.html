<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛞</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Llantaland CRM</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8fafc;
        color: #1e293b;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }

      :root {
        --color-primary: #1a3c5e;
        --color-primary-light: #2563eb;
        --color-accent: #e63946;
        --color-success: #16a34a;
        --color-warning: #ca8a04;
        --color-danger: #dc2626;
        --color-bg: #f8fafc;
        --color-surface: #ffffff;
        --color-border: #e2e8f0;
        --color-text: #1e293b;
        --color-text-muted: #64748b;
        --sidebar-width: 240px;
        --topbar-height: 56px;
        --bottom-nav-height: 64px;
        --radius: 8px;
        --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
        --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
        --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
        /* Safe area para notch/home indicator de iPhone */
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-top: env(safe-area-inset-top, 0px);
      }

      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: inherit; }
      input, select, textarea { font-family: inherit; font-size: 16px; /* evita zoom en iOS */ }

      /* Scrollbar fino en desktop */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

      /* Tap highlight transparente en móvil */
      * { -webkit-tap-highlight-color: transparent; }

      /* Texto no seleccionable en botones */
      button { user-select: none; -webkit-user-select: none; }

      /* Transiciones suaves globales */
      .slide-in { animation: slideIn .25s ease; }
      @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      .fade-in { animation: fadeIn .2s ease; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
