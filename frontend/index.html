<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://llantaland.com/OsoLogoSVG.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Llantaland CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Black+Ops+One&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #080808;
        color: #f0ede8;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }

      :root {
        /* ── Colores Llantaland ── */
        --color-primary:       #f5c400;   /* amarillo marca */
        --color-primary-dark:  #d4a900;   /* amarillo oscuro hover */
        --color-primary-light: #ffd400;   /* amarillo claro */
        --color-accent:        #e3000f;   /* rojo marca */
        --color-success:       #22c55e;
        --color-warning:       #f5c400;
        --color-danger:        #e3000f;

        /* ── Fondos oscuros ── */
        --color-bg:            #080808;
        --color-surface:       #141414;
        --color-surface2:      #1a1a1a;

        /* ── Bordes ── */
        --color-border:        #242424;
        --color-border2:       #303030;

        /* ── Texto ── */
        --color-text:          #f0ede8;
        --color-text-muted:    #888;

        /* ── Layout ── */
        --sidebar-width:       240px;
        --topbar-height:       56px;
        --bottom-nav-height:   64px;
        --radius:              8px;
        --safe-bottom:         env(safe-area-inset-bottom, 0px);
        --safe-top:            env(safe-area-inset-top, 0px);

        /* ── Sombras ── */
        --shadow:    0 1px 3px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.4);
        --shadow-md: 0 4px 6px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3);
        --shadow-lg: 0 10px 20px rgba(0,0,0,.7), 0 4px 8px rgba(0,0,0,.4);
      }

      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: inherit; }
      input, select, textarea { font-family: inherit; font-size: 16px; }

      /* Scrollbar amarillo */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #f5c400; border-radius: 2px; }

      ::selection { background: #f5c400; color: #000; }
      * { -webkit-tap-highlight-color: transparent; }
      button { user-select: none; -webkit-user-select: none; }

      .fade-in { animation: fadeIn .2s ease; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
